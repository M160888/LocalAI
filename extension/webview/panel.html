<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'nonce-PANEL_NONCE'; style-src 'unsafe-inline'; connect-src http://localhost:11434;" />
  <title>Local AI Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--vscode-editor-background, #0f1117);
      --surface: var(--vscode-sideBar-background, #1a1d27);
      --border: var(--vscode-panel-border, #2d3148);
      --text: var(--vscode-editor-foreground, #e8eaf0);
      --text-dim: var(--vscode-descriptionForeground, #8b90a8);
      --accent: var(--vscode-button-background, #6c63ff);
      --accent-fg: var(--vscode-button-foreground, white);
      --input-bg: var(--vscode-input-background, #252836);
      --user-bubble: #2a2d3e;
      --ai-bubble: #1e2130;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--vscode-font-family, sans-serif);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #toolbar label {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    #model-select {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    #ctx-btn {
      font-size: 11px;
      padding: 4px 8px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    #ctx-btn:hover { border-color: var(--accent); color: var(--text); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 92%;
      padding: 10px 13px;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      background: var(--user-bubble);
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .msg.ai {
      background: var(--ai-bubble);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
      border: 1px solid var(--border);
    }
    .msg.system {
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      align-self: center;
      text-align: center;
      border: none;
    }
    .msg code {
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .msg pre {
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 12px;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 6px 0;
      white-space: pre;
    }
    .cursor::after {
      content: "▋";
      animation: blink 0.8s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Context snippet */
    #ctx-preview {
      margin: 4px 12px;
      padding: 6px 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-dim);
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #ctx-preview.visible { display: flex; }
    #ctx-preview span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #ctx-clear {
      cursor: pointer;
      opacity: 0.6;
      font-size: 14px;
      flex-shrink: 0;
    }
    #ctx-clear:hover { opacity: 1; }

    /* Input area */
    #input-area {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
    }
    #user-input:focus { border-color: var(--accent); }
    #send-btn {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send-btn:hover { opacity: 0.9; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Offline banner */
    #offline-banner {
      padding: 10px 16px;
      background: rgba(239,68,68,0.1);
      border-bottom: 1px solid rgba(239,68,68,0.3);
      font-size: 12px;
      color: #f87171;
      display: none;
    }
    #offline-banner.visible { display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="offline-banner">
  Ollama is not running. Start it with <code>ollama serve</code> in a terminal.
</div>

<div id="toolbar">
  <label>Model:</label>
  <select id="model-select"><option value="">Loading…</option></select>
  <button id="ctx-btn" title="Include selected editor text as context">+ Editor context</button>
</div>

<div id="messages">
  <div class="msg system">Local AI Studio — models run on your machine, no internet needed.</div>
</div>

<div id="ctx-preview">
  <span id="ctx-text"></span>
  <span id="ctx-clear" title="Remove context">✕</span>
</div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)"></textarea>
  <button id="send-btn">Send</button>
</div>

<script src="panel.js"></script>
</body>
</html>
